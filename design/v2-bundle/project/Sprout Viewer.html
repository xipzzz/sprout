  html, body { margin: 0; padding: 0; height: 100%; background: #EDE8DF; font-family: 'Nunito', system-ui, sans-serif; overflow: hidden;

       XP, streak, daily goal — never shift layout as digits change (9→10). */
    font-variant-numeric: tabular-nums lining-nums; font-feature-settings: "tnum" 1, "lnum" 1; }
  * { box-sizing: border-box; }
  /* ── Sprout type scale (documented) ─────────────────────────────
     display 32/900 · title 24/900 · section 18/800 · body 15/700 · label 13/800 · caption 11/800-uppercase
     weight roles: 900 titles+numbers · 800 buttons/labels · 700 body · 600 secondary
     One family (Nunito), tabular figures (above). Keep new UI on these steps. */
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(42,35,32,.13); border-radius: 3px; }
  .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; width: 0; height: 0; }
</style>

function useIsMobile(bp) {
  const point = bp || MOBILE_BP;
  const [m, setM] = React.useState(() => window.innerWidth < point);
  React.useEffect(() => {
    const f = () => setM(window.innerWidth < point);
    window.addEventListener('resize', f);
    return () => window.removeEventListener('resize', f);
  }, [point]);
  return m;
}

// Scales the fixed 402×874 device down (or up, in fullscreen) to fit its
// container — guarantees no horizontal scroll on a phone browser.
function FittedPhone({ children, maxScale = 1 }) {
  const wrapRef = React.useRef(null);
  const [scale, setScale] = React.useState(maxScale);
  React.useLayoutEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const compute = () => {
      const aw = el.clientWidth, ah = el.clientHeight;
      if (!aw || !ah) return;
      let s = Math.min(aw / PH_W, ah / PH_H, maxScale);
      if (!isFinite(s) || s <= 0) s = maxScale;
      setScale(s);
    };
    compute();
    const ro = new ResizeObserver(compute);
    ro.observe(el);
    return () => ro.disconnect();
  }, [maxScale]);
  return (
    <div ref={wrapRef} style={{ flex: 1, width: '100%', minHeight: 0, display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', padding: 8 }}>
      <div style={{ width: PH_W * scale, height: PH_H * scale, flexShrink: 0 }}>
        <div style={{ width: PH_W, height: PH_H, transform: `scale(${scale})`, transformOrigin: 'top left' }}>
          <IOSDevice width={PH_W} height={PH_H}>
            {children}
          </IOSDevice>
        </div>
      </div>
    </div>);

}

function Prototype({ ordered, current, onPrev, onNext, tweaks }) {
  const screen = ordered[current];
  const total = ordered.length;

  React.useEffect(() => {
    const h = (e) => {
      if (e.key === 'ArrowLeft') onPrev();
      if (e.key === 'ArrowRight') onNext();
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onPrev, onNext]);

  if (!screen) return null;

  const canPrev = current > 0;
  const canNext = current < total - 1;

  const navBtn = (label, icon, onClick, enabled) =>
  <button
    onClick={onClick}
    disabled={!enabled}
    style={{
      width: 44, height: 44, borderRadius: 999, border: '1px solid rgba(42,35,32,.12)',
      background: '#F7F2E9', color: enabled ? '#2A2320' : '#C8C0B8',
      cursor: enabled ? 'pointer' : 'default',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      opacity: enabled ? 1 : 0.4, transition: 'opacity .12s'
    }}
    aria-label={label}>
    
      {icon}
    </button>;


  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', overflow: 'hidden', padding: '32px 0 0' }}>
      {/* Phone — scales to fit, no horizontal scroll */}
      <FittedPhone>
        <ScreenContent id={screen.id} tweaks={tweaks} />
      </FittedPhone>

      {/* Bottom dock: breadcrumb + pager */}
      <div style={{
        flexShrink: 0, padding: '18px 0 18px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10,
        userSelect: 'none'
      }}>
        <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: '#B0A89C', textTransform: 'uppercase', letterSpacing: '.14em' }}>
          {screen.group} · {screen.label}
        </div>

        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {navBtn('Previous',
          <svg width="7" height="12" viewBox="0 0 7 12"><path d="M5.5 1L1 6l4.5 5" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>,
          onPrev, canPrev)}

          <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: '#9A8F85', letterSpacing: '.06em', minWidth: 64, textAlign: 'center' }}>
            <span style={{ color: '#2A2320', fontWeight: 600 }}>{String(current + 1).padStart(2, '0')}</span>
            {' / '}
            {String(total).padStart(2, '0')}
          </span>

          {navBtn('Next',
          <svg width="7" height="12" viewBox="0 0 7 12"><path d="M1 1l4.5 5L1 11" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round" /></svg>,
          onNext, canNext)}
        </div>
      </div>
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Sidebar
// ─────────────────────────────────────────────────────────────
function Sidebar({ ordered, current, mode, playScreen, onSelect, onClose, dragId, dropInfo, onGripDragStart, onDragEnd, onDragOver, onDrop, onDragLeave }) {
  let lastGroup = null;

  return (
    <div style={{
      width: 220, flexShrink: 0, height: '100%',
      display: 'flex', flexDirection: 'column',
      borderRight: '1px solid rgba(42,35,32,.08)',
      background: '#F5F0E7'
    }}>
      {/* Header — fixed to the toolbar height so its baseline aligns with the top bar */}
      <div style={{
        height: 56, boxSizing: 'border-box', padding: '0 14px',
        borderBottom: '1px solid rgba(42,35,32,.07)',
        display: 'flex', alignItems: 'center', gap: 9, flexShrink: 0
      }}>
        <span style={{ fontWeight: 900, fontSize: 15, color: '#2A2320', letterSpacing: '-.01em' }}>Screens</span>
        <span style={{ marginLeft: 'auto', fontFamily: 'JetBrains Mono, monospace', fontSize: 9, color: '#C0B8B0', background: 'rgba(42,35,32,.06)', borderRadius: 5, padding: '2px 6px' }}>
          {ordered.length}
        </span>
        {onClose &&
        <button onClick={onClose} aria-label="Close screens panel" style={{
          appearance: 'none', border: 0, cursor: 'pointer', background: 'transparent',
          width: 32, height: 32, marginLeft: 2, marginRight: -6, borderRadius: 8, color: '#9A8F85',
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, lineHeight: 1
        }}>×</button>
        }
      </div>

      {/* Screen list */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '6px 8px 16px' }}>
        {ordered.map((screen, i) => {
          const showGroup = screen.group !== lastGroup;
          lastGroup = screen.group;
          const isActive = (mode === 'prototype' && i === current) || (mode === 'play' && screen.id === playScreen);
          const isDragging = dragId === screen.id;
          const isBefore = dropInfo?.targetId === screen.id && dropInfo?.pos === 'before';
          const isAfter = dropInfo?.targetId === screen.id && dropInfo?.pos === 'after';

          return (
            <React.Fragment key={screen.id}>
              {showGroup &&
              <div style={{
                fontFamily: 'JetBrains Mono, monospace', fontSize: 9,
                color: '#C8BEB4', textTransform: 'uppercase', letterSpacing: '.16em',
                padding: `${i === 0 ? '8' : '14'}px 10px 5px`
              }}>
                  {screen.group}
                </div>
              }

              {isBefore &&
              <div style={{ height: 2, background: '#6FBF5E', borderRadius: 2, margin: '2px 10px' }} />
              }

              <div
                onClick={() => onSelect(i)}
                onDragOver={(e) => {e.preventDefault();onDragOver(e, screen.id, 'sidebar');}}
                onDragLeave={(e) => {if (!e.currentTarget.contains(e.relatedTarget)) onDragLeave();}}
                onDrop={(e) => {e.preventDefault();onDrop(e, screen.id, 'sidebar');}}
                style={{
                  display: 'flex', alignItems: 'center', gap: 7,
                  minHeight: 42, padding: '8px 10px', borderRadius: 8,
                  position: 'relative',
                  background: isActive ? 'rgba(79,158,63,.14)' : 'transparent',
                  boxShadow: isActive ? 'inset 3px 0 0 #4D9E3F' : 'none',
                  cursor: 'pointer', opacity: isDragging ? 0.3 : 1,
                  transition: 'background .1s'
                }}>
                
                <span
                  draggable
                  onDragStart={(e) => onGripDragStart(e, screen.id)}
                  onDragEnd={onDragEnd}
                  onClick={(e) => e.stopPropagation()}
                  title="Drag to reorder"
                  style={{ cursor: 'grab', color: isActive ? '#93CA89' : '#C8C0B6', flexShrink: 0, lineHeight: 0, userSelect: 'none' }}>
                  
                  <GripDots />
                </span>
                <span style={{
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
                  color: isActive ? '#4D9E3F' : '#BEB5AB',
                  letterSpacing: '.08em', flexShrink: 0, minWidth: 20
                }}>
                  {String(i + 1).padStart(2, '0')}
                </span>
                <span style={{
                  fontFamily: 'Nunito, system-ui', fontSize: 11, fontWeight: 700,
                  color: isActive ? '#4D9E3F' : '#6E6259',
                  textTransform: 'uppercase', letterSpacing: '.06em',
                  overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1
                }}>
                  {screen.label}
                </span>
              </div>

              {isAfter &&
              <div style={{ height: 2, background: '#6FBF5E', borderRadius: 2, margin: '2px 10px' }} />
              }
            </React.Fragment>);

        })}
      </div>
    </div>);

}

// ─────────────────────────────────────────────────────────────

}

// ─────────────────────────────────────────────────────────────
// Control bar  ·  [ ☰ Screens ] [ Mode ▾ ] ······ [ Tweaks ]
// ─────────────────────────────────────────────────────────────
const MODES = [
{ id: 'gallery', label: 'Gallery', desc: 'All screens as a grid' },
{ id: 'play', label: 'Prototype', desc: 'The live, wired app' },
{ id: 'exploration', label: 'Exploration', desc: 'Design ideas in testing' }];


function ModeDropdown({ mode, onMode }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const h = (e) => {if (ref.current && !ref.current.contains(e.target)) setOpen(false);};
    document.addEventListener('mousedown', h);
    document.addEventListener('touchstart', h);
    return () => {document.removeEventListener('mousedown', h);document.removeEventListener('touchstart', h);};
  }, []);
  const cur = MODES.find((m) => m.id === mode) || MODES[0];
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen((o) => !o)} style={{
        appearance: 'none', cursor: 'pointer', minHeight: 44, padding: '0 12px',
        display: 'flex', alignItems: 'center', gap: 8, borderRadius: 12,
        border: '1px solid rgba(42,35,32,.14)', background: '#FFFDF7',
        fontFamily: 'Nunito, system-ui', fontSize: 14, fontWeight: 800, color: '#2A2320'
      }}>
        {cur.label}
        <svg width="11" height="7" viewBox="0 0 11 7" fill="none" style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .15s' }}>
          <path d="M1 1l4.5 4.5L10 1" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      </button>
      {open &&
      <div style={{
        position: 'absolute', top: 'calc(100% + 6px)', left: 0, zIndex: 80,
        width: 220, background: '#FFFDF7', borderRadius: 14,
        border: '1px solid rgba(42,35,32,.1)',
        boxShadow: '0 16px 44px -8px rgba(0,0,0,.26)', overflow: 'hidden', padding: 6
      }}>
          {MODES.map((m) => {
            const on = m.id === mode;
            return (
              <button key={m.id} onClick={() => {onMode(m.id);setOpen(false);}} style={{
                appearance: 'none', cursor: 'pointer', width: '100%', textAlign: 'left',
                display: 'flex', flexDirection: 'column', gap: 1, padding: '10px 11px',
                borderRadius: 10, border: 0, background: on ? 'rgba(79,158,63,.12)' : 'transparent',
                fontFamily: 'inherit'
              }}
              onMouseEnter={(e) => {if (!on) e.currentTarget.style.background = 'rgba(42,35,32,.05)';}}
              onMouseLeave={(e) => {if (!on) e.currentTarget.style.background = 'transparent';}}>
                <span style={{ fontSize: 14, fontWeight: 800, color: on ? '#4D9E3F' : '#2A2320' }}>{m.label}</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: '#9A8F85' }}>{m.desc}</span>
              </button>);

          })}
        </div>
      }
    </div>);

}

// Desktop: 3-way segmented pill — one tap to switch, active segment filled dark.
function ModeSegments({ mode, onMode }) {
  return (
    <div style={{ display: 'inline-flex', padding: 3, background: 'rgba(42,35,32,.08)', borderRadius: 999 }}>
      {MODES.map((m) => {
        const on = m.id === mode;
        return (
          <button key={m.id} onClick={() => onMode(m.id)} title={m.desc} style={{
            appearance: 'none', border: 0, outline: 0, cursor: 'pointer',
            minHeight: 38, padding: '0 16px', borderRadius: 999,
            fontFamily: 'Nunito, system-ui', fontSize: 14, fontWeight: 800,
            background: on ? '#2A2320' : 'transparent',
            color: on ? '#F5F0E7' : '#8A7F75',
            transition: 'background .15s, color .15s'
          }}>{m.label}</button>);

      })}
    </div>);

}

function ControlBar({ mode, onMode, panelOpen, onTogglePanel, onOpenPanel, tweaksCount, isMobile, toolOpen }) {
  return (
    <div style={{
      height: 56, flexShrink: 0, position: 'relative', zIndex: 60,

      background: 'rgba(245,240,231,.96)',

    }}>
      {/* ☰ Screens toggle — only when the panel is closed; the open panel has its own "Screens" header + ✕.

      }}>
        <svg width="15" height="15" viewBox="0 0 14 14" fill="none">
          <circle cx="4" cy="4" r="1.7" fill="currentColor" />
          <path d="M7 4H13" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" />
          <path d="M1 4H1.5" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" />
          <circle cx="10" cy="10" r="1.7" fill="currentColor" />
          <path d="M7 10H1" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" />
          <path d="M13 10H12.5" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" />
        </svg>
        {!isMobile && 'Panel'}
        {tweaksCount > 0 &&
        <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, background: '#6FBF5E', color: '#fff', padding: '1px 6px', borderRadius: 999, lineHeight: 1.4 }}>{tweaksCount}</span>
        }
      </button>
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Floating tweaks controller (bottom-right)
// ─────────────────────────────────────────────────────────────
function Stepper({ label, value, min, max, onChange }) {
  const dec = () => onChange(Math.max(min, value - 1));
  const inc = () => onChange(Math.min(max, value + 1));
  const btn = (enabled) => ({
    appearance: 'none', border: '1px solid rgba(42,35,32,.14)', cursor: enabled ? 'pointer' : 'default',
    width: 30, height: 30, borderRadius: 9, background: enabled ? '#FFFDF7' : '#F2ECE0',
    color: enabled ? '#2A2320' : '#C4BAAC', fontSize: 18, fontWeight: 800, lineHeight: 1,
    display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'inherit', flexShrink: 0,
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 10px' }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 800, fontSize: 13, color: '#2A2320' }}>{label}</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 7, flexShrink: 0 }}>
        <button onClick={dec} disabled={value <= min} style={btn(value > min)} aria-label={`Decrease ${label}`}>–</button>
        <span style={{ minWidth: 20, textAlign: 'center', fontWeight: 900, fontSize: 14, color: '#2A2320', fontVariantNumeric: 'tabular-nums' }}>{value}</span>
        <button onClick={inc} disabled={value >= max} style={btn(value < max)} aria-label={`Increase ${label}`}>+</button>
      </div>
    </div>
  );
}

function ToolPanel({ tweaks, onTweaks, updates, screensById, onSelectUpdate, open, tab, onTab, onClose, mode, explEx, explIdx, explTotal }) {

              onMouseLeave={(e) => { if (i !== 0) e.currentTarget.style.background = 'transparent'; }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>

                  <rect x="2.5" y="1.5" width="7" height="9" rx="1.2" />
                  <path d="M5 5.5h2M5 7.5h2" strokeLinecap="round" />
                </svg>
                <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{target ? target.label : u.screen}</span>
              </div>
            </div>
          );
        })}
      </div>
      }

      {/* Tweaks rows */}
      {onTweaksTab &&
      <div style={{ flex: 1, overflowY: 'auto', padding: '4px 6px 8px' }}>
        {/* Course position — jump the Winding Path to any Section / Unit */}
        {(() => {
          const sections = (window.COURSE_SECTIONS || [{ units: [{}] }]);
          const secCount = sections.length;
          const section = Math.max(1, Math.min(tweaks.section || 1, secCount));
          const sec = sections[section - 1];
          const unitCount = sec ? sec.units.length : 1;
          const unit = Math.max(1, Math.min(tweaks.unit || 1, unitCount));
          const focusUnit = sec ? sec.units[unit - 1] : null;
          const lessonCount = focusUnit ? focusUnit.lessons.length : 1;
          const defaultLesson = Math.floor(lessonCount / 2) + 1;
          const lessonN = Math.max(1, Math.min(tweaks.lessonN || defaultLesson, lessonCount));
          const heading = focusUnit
            ? `Section ${section} · Unit ${unit} · ${focusUnit.title}`
            : `Section ${section} · Unit ${unit}`;
          return (
            <div style={{ padding: '2px 4px 8px', borderBottom: '1px solid rgba(42,35,32,.06)', marginBottom: 4 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, padding: '4px 8px 2px' }}>
                <span style={{ fontWeight: 900, fontSize: 11, color: '#9A8F85', textTransform: 'uppercase', letterSpacing: '.08em' }}>Course position</span>
              </div>
              <div style={{ fontSize: 11, color: '#6FBF5E', fontWeight: 800, padding: '0 8px 4px' }}>{heading}</div>
              <Stepper label="Section" value={section} min={1} max={secCount}
                onChange={(v) => onTweaks({ ...tweaks, section: v, unit: 1, lessonN: undefined })} />
              <Stepper label="Unit" value={unit} min={1} max={unitCount}
                onChange={(v) => onTweaks({ ...tweaks, section, unit: v, lessonN: undefined })} />
              <Stepper label="Lesson" value={lessonN} min={1} max={lessonCount}
                onChange={(v) => onTweaks({ ...tweaks, section, unit, lessonN: v })} />
            </div>
          );
        })()}
        {items.map(({ key, label, desc }) => {
          const on = !!tweaks[key];
          return (
            <button
              key={key}
              onClick={() => onTweaks((prev) => ({ ...prev, [key]: !prev[key] }))}
              style={{
                appearance: 'none', border: 0, cursor: 'pointer', background: 'transparent',
                width: '100%', padding: '10px 10px',
                display: 'flex', alignItems: 'center', gap: 12,
                borderRadius: 10, textAlign: 'left',
                fontFamily: 'inherit',
                transition: 'background .1s'
              }}
              onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(42,35,32,.04)'}
              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
              
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: '#2A2320' }}>{label}</div>
                <div style={{ fontSize: 11, color: '#9A8F85', marginTop: 1 }}>{desc}</div>
              </div>
              {/* iOS-style switch */}
              <div style={{
                width: 34, height: 20, borderRadius: 999, flexShrink: 0,
                background: on ? '#6FBF5E' : 'rgba(42,35,32,.15)',
                position: 'relative', transition: 'background .15s'
              }}>
                <div style={{
                  position: 'absolute', top: 2, left: on ? 16 : 2,
                  width: 16, height: 16, borderRadius: '50%', background: '#fff',
                  boxShadow: '0 1px 3px rgba(0,0,0,.2)',
                  transition: 'left .15s'
                }} />
              </div>
            </button>);

        })}
      </div>
      }
    </div>);

}

// ─────────────────────────────────────────────────────────────
// Lazy Exploration bundle
// The Exploration deck's three component files are large JSX (~850KB of in-browser
// Babel). They are NOT loaded eagerly; the first time the Exploration tab is opened
// we fetch each, transform it once with Babel, and append it as a classic <script>
// so its top-level `function`/`const` declarations land in global scope exactly as
// an eager <script type="text/babel"> would. Order is preserved (parts → views →
// exploration) so PROPOSED_VIEWS in exploration.jsx sees the component functions.
// Result: Play / Gallery / Prototype boot without the exploration transform.
// ─────────────────────────────────────────────────────────────
let __EXPL_LOAD = null;
function ensureExplorationLoaded() {
  if (__EXPL_LOAD) return __EXPL_LOAD;
  const files = ['exploration-parts.jsx', 'exploration-views.jsx', 'exploration.jsx'];
  __EXPL_LOAD = (async () => {
    for (const f of files) {
      const code = await (await fetch(f)).text();
      const out = Babel.transform(code, { presets: ['react'], filename: f }).code;
      const s = document.createElement('script');
      s.textContent = out;
      document.head.appendChild(s); // classic script → executes synchronously in global scope
    }
  })();
  return __EXPL_LOAD;
}

// Calm placeholder shown while the exploration bundle transforms on first open.
function ExplorationLoading() {
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14, background: '#EDE8DF' }}>
      <style>{`@keyframes explSpin{to{transform:rotate(360deg)}}`}</style>
      <div style={{ width: 32, height: 32, borderRadius: '50%', border: '3px solid rgba(79,158,63,.25)', borderTopColor: '#4D9E3F', animation: 'explSpin .8s linear infinite' }} />
      <div style={{ fontFamily: 'Nunito, system-ui', fontWeight: 800, fontSize: 13, color: '#6E6259', letterSpacing: '.02em' }}>Growing the exploration deck…</div>
    </div>);

}

// ─────────────────────────────────────────────────────────────
// App
// ─────────────────────────────────────────────────────────────
function App() {
  const isMobile = useIsMobile();
  const [mode, setMode] = React.useState('play');
  const [explSel, setExplSel] = React.useState(0);
  // Heavy Exploration component bundle loads lazily on first open of its tab.
  const [explReady, setExplReady] = React.useState(false);
  React.useEffect(() => {
    if (mode === 'exploration' && !explReady) {
      ensureExplorationLoaded()
        .then(() => setExplReady(true))
        .catch((e) => console.error('Exploration bundle failed to load', e));
    }
  }, [mode, explReady]);
  const [panelOpen, setPanelOpen] = React.useState(() => window.innerWidth >= MOBILE_BP);
  // Combined Tweaks+Updates panel — one entry point, segmented tabs, remembers last tab.
  const [toolOpen, setToolOpen] = React.useState(() => window.innerWidth >= MOBILE_BP);
  const [toolTab, setToolTab] = React.useState(() => { try { return localStorage.getItem('sprout.toolTab') || 'updates'; } catch (e) { return 'updates'; } });
  const selectToolTab = (t) => { setToolTab(t); try { localStorage.setItem('sprout.toolTab', t); } catch (e) {} };

  const [order, setOrder] = React.useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem(ORDER_KEY) || 'null');
      if (Array.isArray(s) && s.length === ALL_SCREENS.length && s.every((id) => ALL_SCREENS.find((sc) => sc.id === id)))
      return s;
    } catch (e) {}
    return ALL_SCREENS.map((s) => s.id);
  });

  const [current, setCurrent] = React.useState(0);
  // In Play mode, the Screens panel acts as a navigator: this holds the screen id
  // the live Play preview is pinned to (null = the default interactive home loop).
  const [playScreen, setPlayScreen] = React.useState(null);

  const [tweaks, setTweaks] = React.useState({
    calm: true,
    lightMode: true
  });
  // keep the reduce-motion body class synced to the in-app toggle ('on' forces calm motion everywhere)
  if (typeof useReduceMotionClass === 'function') useReduceMotionClass(tweaks.reduceMotion);

  // ── Live theme (Light / Dark / System + auto-evening) ──
  // Read persisted prefs; the Settings Appearance control dispatches 'sprout-theme'
  // so this top-level listener can re-theme the WHOLE app (SPROUT mutated + re-render).
  const readTheme = () => { try { return localStorage.getItem('sprout.theme') || 'system'; } catch (e) { return 'system'; } };
  const readEvening = () => { try { return localStorage.getItem('sprout.autoEvening') === 'on'; } catch (e) { return false; } };
  const [themePref, setThemePref] = React.useState(readTheme);
  const [autoEvening, setAutoEvening] = React.useState(readEvening);
  React.useEffect(() => {
    const onTheme = (e) => {
      if (e.detail && e.detail.pref != null) setThemePref(e.detail.pref);
      if (e.detail && e.detail.autoEvening != null) setAutoEvening(e.detail.autoEvening);
    };
    window.addEventListener('sprout-theme', onTheme);
    return () => window.removeEventListener('sprout-theme', onTheme);
  }, []);
  // apply BEFORE children render so every screen reads the right palette this pass
  const resolvedTheme = (typeof resolveTheme === 'function') ? resolveTheme(themePref, autoEvening) : 'light';
  if (typeof applyTheme === 'function') applyTheme(resolvedTheme);

  // drag state
  const [dragId, setDragId] = React.useState(null);
  const [dropInfo, setDropInfo] = React.useState(null); // { targetId, pos: 'before'|'after' }

  const ordered = order.map((id) => ALL_SCREENS.find((s) => s.id === id)).filter(Boolean);

  // reorder helper
  function reorder(fromId, toId, pos) {
    if (!fromId || fromId === toId) return;
    const curId = ordered[current]?.id;
    setOrder((prev) => {
      const a = [...prev];
      const fi = a.indexOf(fromId);
      if (fi < 0) return prev;
      a.splice(fi, 1);
      let ti = a.indexOf(toId);
      if (ti < 0) return prev;
      if (pos === 'after') ti++;
      a.splice(ti, 0, fromId);
      localStorage.setItem(ORDER_KEY, JSON.stringify(a));
      if (curId) {
        const ni = a.indexOf(curId);
        if (ni >= 0) setCurrent(ni);
      }
      return a;
    });
  }

  function onGripDragStart(e, id) {
    setDragId(id);
    e.dataTransfer.effectAllowed = 'move';
    try {e.dataTransfer.setData('text/plain', id);} catch (err) {}
  }

  function onDragEnd() {
    setDragId(null);
    setDropInfo(null);
  }

  function onDragLeave() {
    setDropInfo(null);
  }

  function onDragOver(e, targetId, zone) {
    if (!dragId || dragId === targetId) {setDropInfo(null);return;}
    const rect = e.currentTarget.getBoundingClientRect();
    const pos = zone === 'sidebar' ?
    e.clientY - rect.top < rect.height / 2 ? 'before' : 'after' :
    e.clientX - rect.left < rect.width / 2 ? 'before' : 'after';
    setDropInfo((prev) =>
    prev?.targetId === targetId && prev?.pos === pos ? prev : { targetId, pos }
    );
  }

  function onDrop(e, targetId, zone) {
    if (!dragId) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pos = zone === 'sidebar' ?
    e.clientY - rect.top < rect.height / 2 ? 'before' : 'after' :
    e.clientX - rect.left < rect.width / 2 ? 'before' : 'after';
    reorder(dragId, targetId, pos);
    setDragId(null);
    setDropInfo(null);
  }

  const dragHandlers = { onGripDragStart, onDragEnd, onDragOver, onDrop, onDragLeave };

  const closePanelOnMobile = () => { if (isMobile) setPanelOpen(false); };

  const sidebar = (
    <Sidebar
      ordered={ordered}
      current={current}
      mode={mode}
      playScreen={playScreen}
      onClose={() => setPanelOpen(false)}
      onSelect={(i) => {
        setCurrent(i);
        if (mode === 'play') {
          // Stay in Play — pin the live preview to the chosen screen (works for all 59).
          setPlayScreen(ordered[i].id);
        } else if (mode === 'gallery') {
          setMode('prototype');
        }
        // Keep the panel open so it acts as a table of contents — jump screen to screen.
      }}
      dragId={dragId}
      dropInfo={dropInfo}
      {...dragHandlers} />
  );

  const screensById = React.useMemo(() => {
    const m = {};
    ALL_SCREENS.forEach((s) => { m[s.id] = s; });
    return m;
  }, []);

  const selectUpdate = (screenId) => {
    const i = ordered.findIndex((s) => s.id === screenId);
    if (i >= 0) {
      setCurrent(i);
      if (mode !== 'prototype') setMode('prototype');
    }
    if (isMobile) setToolOpen(false);
  };

  const tweaksCount = ['calm', 'lightMode', 'lowWater', 'firstTime', 'milestoneDemo'].filter((k) => tweaks[k]).length
    + ((tweaks.section && tweaks.section > 1) || (tweaks.unit && tweaks.unit > 1) ? 1 : 0);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
      {typeof JuiceStyles === 'function' && <JuiceStyles />}

      {/* Mobile Screens panel — viewport-level slide-over so its header sits flush at the very top (y=0), level with the toolbar */}
      {isMobile && mode !== 'exploration' &&
        <div style={{
          position: 'fixed', top: 0, bottom: 0, left: 0, zIndex: 65,
          transform: panelOpen ? 'translateX(0)' : 'translateX(-100%)',
          transition: 'transform .24s cubic-bezier(.4,0,.2,1)',
          boxShadow: panelOpen ? '0 0 40px rgba(0,0,0,.18)' : 'none',
          pointerEvents: panelOpen ? 'auto' : 'none'
        }}>
          {sidebar}
        </div>
      }

      {/* Mobile Exploration Index — same slide-over drawer pattern as the Screens panel */}
      {isMobile && mode === 'exploration' && explReady &&
        <React.Fragment>
          <div onClick={() => setPanelOpen(false)} style={{
            position: 'fixed', inset: 0, zIndex: 64, background: 'rgba(42,35,32,.4)',
            opacity: panelOpen ? 1 : 0, pointerEvents: panelOpen ? 'auto' : 'none',
            transition: 'opacity .24s cubic-bezier(.4,0,.2,1)'
          }} />
          <div style={{
            position: 'fixed', top: 0, bottom: 0, left: 0, zIndex: 65,
            transform: panelOpen ? 'translateX(0)' : 'translateX(-100%)',
            transition: 'transform .24s cubic-bezier(.4,0,.2,1)',
            boxShadow: panelOpen ? '0 0 40px rgba(0,0,0,.18)' : 'none',
            pointerEvents: panelOpen ? 'auto' : 'none'
          }}>
            <ExplorationIndex items={EXPLORATIONS} sel={explSel}
              onSelect={(i) => { setExplSel(i); setPanelOpen(false); }} isMobile={false} />
          </div>
        </React.Fragment>
      }

      {/* Outer row: desktop Screens panel rises full-height beside the toolbar+content */}
      <div style={{ flex: 1, display: 'flex', minHeight: 0, overflow: 'hidden' }}>

        {/* Desktop Screens panel — full height, header flush with the top toolbar.
            Exploration provides its own left index, so the global Screens panel steps aside there. */}
        {!isMobile && panelOpen && mode !== 'exploration' && sidebar}

        {/* Exploration's left index — rises full-height beside the toolbar, flush to the
            very top exactly like the Screens panel (no empty band under the tab bar). */}
        {!isMobile && mode === 'exploration' && explReady &&
          <ExplorationIndex items={EXPLORATIONS} sel={explSel} onSelect={setExplSel} isMobile={false} />}

        {/* Right column: toolbar on top, content below */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
          <ControlBar
            key={'cb-' + mode}
            mode={mode}
            onMode={(m) => { setMode(m); closePanelOnMobile(); }}
            panelOpen={panelOpen}
            onTogglePanel={() => setPanelOpen((o) => !o)}
            onOpenPanel={() => { setToolOpen((o) => !o); if (isMobile) setPanelOpen(false); }}
            tweaksCount={tweaksCount}
            toolOpen={toolOpen}
            isMobile={isMobile} />

          <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative', minHeight: 0, paddingRight: (toolOpen && !isMobile) ? 300 : 0, transition: 'padding-right .24s cubic-bezier(.4,0,.2,1)' }}>
            {/* Main view */}
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', minWidth: 0 }}>
              {mode === 'gallery' ?
              <Gallery
                ordered={ordered}
                tweaks={tweaks}
                onOpen={(i) => { setCurrent(i); setMode('prototype'); }}
                dragId={dragId}
                dropInfo={dropInfo}
                {...dragHandlers} /> :

              mode === 'play' ?
              <PlayMode tweaks={tweaks} isMobile={isMobile} playScreen={playScreen} onClearScreen={() => setPlayScreen(null)} screensById={screensById} /> :

              mode === 'exploration' ?
              (explReady ?
                <ExplorationBoard tweaks={tweaks} ScreenContent={ScreenContent} isMobile={isMobile} sel={explSel} onSel={setExplSel} /> :
                <ExplorationLoading />) :

              <Prototype
                ordered={ordered}
                current={current}
                onPrev={() => setCurrent((c) => Math.max(0, c - 1))}
                onNext={() => setCurrent((c) => Math.min(ordered.length - 1, c + 1))}
                tweaks={tweaks} />
              }
            </div>
          </div>
        </div>
      </div>

      {/* Combined Tweaks + Updates panel — segmented tabs, one entry point + X.
          Keyed on the tweak values so the toggles' visuals always reflect live state
          (the panel is stateless, so remounting on change is safe + cheap). */}
      <ToolPanel
        key={'tp-' + [tweaks.calm, tweaks.lowWater, tweaks.firstTime, tweaks.milestoneDemo, tweaks.lightMode, tweaks.section, tweaks.unit, tweaks.lessonN].join('|') + '-' + toolTab + '-' + mode + '-' + explSel}
        mode={mode}
        explEx={explReady ? EXPLORATIONS[explSel] : null}
        explIdx={explSel}
        explTotal={EXPLORATIONS.length}
        tweaks={tweaks}
        onTweaks={setTweaks}
        updates={UPDATES}
        screensById={screensById}
        onSelectUpdate={selectUpdate}
        open={toolOpen}
        tab={toolTab}
        onTab={selectToolTab}
        onClose={() => setToolOpen(false)} />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
