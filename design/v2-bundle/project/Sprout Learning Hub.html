<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sprout — Learning Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Nunito', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="water-gauge.jsx"></script>
<script type="text/babel" src="mascot.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>
<script type="text/babel" src="exercises.jsx"></script>
<script type="text/babel" src="feedback.jsx"></script>
<script type="text/babel" src="out-of-water.jsx"></script>
<script type="text/babel" src="lesson-complete.jsx"></script>
<script type="text/babel" src="garden-collection.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "calm": true,
  "lightMode": true
}/*EDITMODE-END*/;

function TweakPanel({ tweaks, setTweaks, onClose }) {
  const Row = ({ id, title, desc }) => (
    <label style={{
      display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 0',
      borderBottom: '1px solid rgba(0,0,0,0.06)', cursor: 'pointer',
    }}>
      <input type="checkbox" checked={!!tweaks[id]} onChange={(e) => setTweaks({ ...tweaks, [id]: e.target.checked })} style={{ marginTop: 3, width: 18, height: 18, accentColor: '#4D9E3F' }}/>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 800, fontSize: 14, color: '#2A2320' }}>{title}</div>
        <div style={{ fontSize: 12, color: '#857B70', marginTop: 2 }}>{desc}</div>
      </div>
    </label>
  );
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, width: 300,
      background: '#fff', borderRadius: 18, padding: 16,
      boxShadow: '0 8px 30px rgba(0,0,0,0.18)',
      fontFamily: 'Nunito, system-ui', zIndex: 1000,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', marginBottom: 4 }}>
        <div style={{ fontWeight: 900, fontSize: 16 }}>Tweaks</div>
        <div style={{ flex: 1 }}/>
        <button onClick={onClose} style={{ border: 'none', background: 'transparent', fontSize: 20, cursor: 'pointer', color: '#857B70' }}>×</button>
      </div>
      <Row id="calm" title="No streak anxiety" desc="Hide streaks and timers. Replace with gentle growth."/>
      <Row id="lightMode" title="Light mode" desc="Always-on warm cream palette."/>
    </div>
  );
}

function Frame({ label, children }) {
  return (
    <DCArtboard label={label} width={402} height={874} style={{ borderRadius: 48, background: '#F2F2F7' }}>
      <IOSDevice width={402} height={874} dark={false}>
        {children}
      </IOSDevice>
    </DCArtboard>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [panel, setPanel] = React.useState(false);
  const [editMode, setEditMode] = React.useState(false);

  // edit-mode protocol
  React.useEffect(() => {
    const h = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') { setEditMode(true); setPanel(true); }
      if (e.data.type === '__deactivate_edit_mode') { setEditMode(false); setPanel(false); }
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  const updateTweaks = (next) => {
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  return (
    <>
      <DesignCanvas>
        <DCSection
          title="Sprout · Home screen explorations"
          subtitle="Original gamified language-learning app. Mascot Pip (a sprout). Three directions for the home / learning hub — same data, same mascot, same tweak toggles, different feel."
        >
          <div style={{ position: 'relative' }}>
            <Frame label="A · Winding path — familiar & gamified">
              <VariantA tweaks={tweaks}/>
            </Frame>
            <DCPostIt bottom={-60} left={20} rotate={-2} width={320}>
              Closest to genre conventions. Zig-zag node trail, mascot hovering over the active lesson.
            </DCPostIt>
          </div>

          <div style={{ position: 'relative' }}>
            <Frame label="B · Sprout Garden — plants as lessons">
              <VariantB tweaks={tweaks}/>
            </Frame>
            <DCPostIt bottom={-60} left={20} rotate={2} width={320}>
              Novel metaphor tied to the brand: each unit is a garden bed. Seeds grow into flowers as you learn.
            </DCPostIt>
          </div>

          <div style={{ position: 'relative' }}>
            <Frame label="C · Today card — calm & focused">
              <VariantC tweaks={tweaks}/>
            </Frame>
            <DCPostIt bottom={-60} left={20} rotate={-2} width={320}>
              One lesson at a time. Removes the overwhelm of a giant path. Good pair with "No streak anxiety".
            </DCPostIt>
          </div>
        </DCSection>

        <DCSection
          title="Sprout · Lesson exercises"
          subtitle="Six exercise types in the same shell — progress bar, hearts, prompt, answer zone, Check button."
        >
          <Frame label="Multiple choice (image → word)"><ExMultipleChoice/></Frame>
          <Frame label="Arrange words into sentence"><ExArrange/></Frame>
          <Frame label="Type what you hear"><ExTypeHear/></Frame>
          <Frame label="Match pairs"><ExMatch/></Frame>
          <Frame label="Speak out loud"><ExSpeak/></Frame>
          <Frame label="Fill in the blank"><ExFillBlank/></Frame>
        </DCSection>

        <DCSection
          title="Sprout · Out of water"
          subtitle="Dropped the heart for a glass-of-water metaphor (fits Pip the sprout). Modal slides up over the exercise when water hits zero. Three paths: subscribe for unlimited water, practice a past lesson to earn one back, or use an inventory item. Next free refill timer is visible so free users aren't dead in the water. Calm mode reframes it as 'Pip needs a rest'."
        >
          <Frame label="Out of water — standard"><ExWithOutOfWater variant="standard"/></Frame>
          <Frame label="Out of water — calm mode"><ExWithOutOfWater variant="calm"/></Frame>
        </DCSection>

        <DCSection
          title="Sprout · Feedback drawer"
          subtitle="After the user taps Check, a drawer slides up from the bottom. Green 'Nicely done!' with XP and a mini-lesson, or red 'Not quite' with the correct answer + explanation. Options get color-coded in place — wrong picks go red, right answer lights up green. Tap Continue to dismiss."
        >
          <Frame label="Correct — Nicely done!"><ExWithFeedback variant="correct"/></Frame>
          <Frame label="Wrong — Not quite"><ExWithFeedback variant="wrong"/></Frame>
        </DCSection>

        <DCSection
          title="Sprout · Lesson complete"
          subtitle="Reward screen with rolling XP, accuracy, and streak update. Confetti on mount; Pip cheers while the numbers count up. Respects Calm mode — swaps streak for a growth message."
        >
          <Frame label="Lesson complete — standard"><LessonComplete tweaks={{ calm: false }}/></Frame>
          <Frame label="Lesson complete — calm mode"><LessonComplete tweaks={{ calm: true }}/></Frame>
        </DCSection>

        <DCSection title="Design notes" subtitle="How the three share a system">
          <DCArtboard label="System" width={560} height={300} style={{ background: '#fff', padding: 24 }}>
            <div style={{ fontFamily: 'Nunito, system-ui', padding: 20, fontSize: 14, lineHeight: 1.55, color: '#2A2320' }}>
              <div style={{ fontWeight: 900, fontSize: 18, marginBottom: 8 }}>Brand: Sprout</div>
              <div>A new brand, not Duolingo. Mascot "Pip" is a friendly sprout — a growing plant metaphor.</div>
              <div style={{ marginTop: 14, fontWeight: 800 }}>Colors</div>
              <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
                {['#FDF8EE','#6FBF5E','#F5B94A','#F47A7A','#A8D8EA','#C9B8E3','#2A2320'].map(c => (
                  <div key={c} style={{ width: 40, height: 40, borderRadius: 10, background: c, border: '1px solid rgba(0,0,0,0.08)' }}/>
                ))}
              </div>
              <div style={{ marginTop: 14, fontWeight: 800 }}>Type</div>
              <div>Nunito 700/800/900. Playful but legible.</div>
              <div style={{ marginTop: 14, fontWeight: 800 }}>Components</div>
              <div>Push-button (flat top, solid drop shadow, presses down on tap). Stat chip. Section banner. Lesson node with progress ring.</div>
            </div>
          </DCArtboard>

          <DCArtboard label="Tweaks" width={360} height={300} style={{ background: '#fff', padding: 24 }}>
            <div style={{ fontFamily: 'Nunito, system-ui', padding: 20, fontSize: 13, lineHeight: 1.55, color: '#2A2320' }}>
              <div style={{ fontWeight: 900, fontSize: 16, marginBottom: 8 }}>Try the toggles</div>
              <div style={{ marginBottom: 10 }}>Turn on <b>Tweaks</b> in the toolbar (or use the button, bottom-right) to enable:</div>
              <ul style={{ paddingLeft: 18, margin: 0 }}>
                <li><b>One-handed reach</b> — pins a Continue action to the thumb zone</li>
                <li><b>No streak anxiety</b> — hides the flame, swaps in a "days growing" counter</li>
                <li><b>Light mode</b> — warm cream palette (on by default; all three frames)</li>
              </ul>
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {/* floating Tweaks toggle (in case user doesn't see the toolbar) */}
      {!panel && (
        <button onClick={() => setPanel(true)} style={{
          position: 'fixed', bottom: 20, right: 20, padding: '10px 16px',
          background: '#4D9E3F', color: '#fff', border: 'none', borderRadius: 999,
          fontWeight: 800, fontSize: 14, cursor: 'pointer',
          boxShadow: '0 4px 16px rgba(0,0,0,0.2)', zIndex: 999,
          fontFamily: 'Nunito, system-ui',
        }}>
          Tweaks
        </button>
      )}
      {panel && <TweakPanel tweaks={tweaks} setTweaks={updateTweaks} onClose={() => setPanel(false)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
